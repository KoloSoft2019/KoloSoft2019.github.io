<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronom (1s)</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

button {
    font-size: 2rem;
    padding: 20px 40px;
    cursor: pointer;
}
button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
</style>
</head>

<body>

<button id="startButton">Start</button>

<script>
(async () => {

    const button = document.getElementById("startButton");

    let audioContext = null;
    let audioBuffer = null;
    let running = false;
    let nextBeatTime = 0;
    let timerID = null;
    let isLoading = false;

    // 🎯 Intervall auf exakt 1 Sekunde (1000ms) gesetzt
    const interval = 1.0; 

    async function loadSound(ctx) {
        const response = await fetch("Beat.mp3");
        if (!response.ok) {
            throw new Error("Beat.mp3 konnte nicht geladen werden.");
        }
        const arrayBuffer = await response.arrayBuffer();
        return await ctx.decodeAudioData(arrayBuffer);
    }

    function schedule() {
        // Lookahead-Scheduling für maximale Präzision
        while (nextBeatTime < audioContext.currentTime + 0.2) {
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);

            source.start(nextBeatTime);
            nextBeatTime += interval;
        }

        if (running) {
            timerID = setTimeout(schedule, 25);
        }
    }

    button.addEventListener("click", async () => {
        if (isLoading) return;

        // START
        if (!running) {
            if (!audioContext) {
                try {
                    isLoading = true;
                    //button.textContent = "Lädt...";
                    button.disabled = true;

                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioBuffer = await loadSound(audioContext);
                } catch (error) {
                    alert("Fehler: " + error.message);
                    button.textContent = "Start";
                    return;
                } finally {
                    isLoading = false;
                    button.disabled = false;
                }
            }

            if (audioContext.state === "suspended") {
                await audioContext.resume();
            }

            button.textContent = "Stop";
            running = true;
            
            // Startet ohne spürbare Verzögerung
            nextBeatTime = audioContext.currentTime + 0.05;
            schedule();
        }
        // STOP
        else {
            running = false;
            button.textContent = "Start";

            if (timerID) {
                clearTimeout(timerID);
                timerID = null;
            }
        }
    });

})();
</script>

</body>
</html>

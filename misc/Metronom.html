<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exaktes Metronom</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        button {
            font-size: 2rem;
            padding: 20px 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="startButton">Start</button>

<script>
(async () => {

    const button = document.getElementById("startButton");

    let audioContext = null;
    let audioBuffer = null;
    let running = false;

    async function loadSound() {
        const response = await fetch("Beat.mp3");

        if (!response.ok) {
            throw new Error("click.mp3 konnte nicht geladen werden.");
        }

        const arrayBuffer = await response.arrayBuffer();
        return await audioContext.decodeAudioData(arrayBuffer);
    }

    function startMetronome() {

        let nextBeatTime = audioContext.currentTime;

        function scheduler() {

            while (nextBeatTime < audioContext.currentTime + 0.1) {

                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);

                source.start(nextBeatTime);

                nextBeatTime += 1.0; // exakt 1000 ms
            }

            if (running) {
                requestAnimationFrame(scheduler);
            }
        }

        scheduler();
    }

    button.addEventListener("click", async () => {

        if (running) return;

        try {

            button.disabled = true;
            button.textContent = "Lade...";

            audioContext = new AudioContext();

            audioBuffer = await loadSound();

            running = true;

            button.textContent = "Läuft";

            startMetronome();

        } catch (error) {

            console.error(error);

            button.disabled = false;
            button.textContent = "Fehler";

            alert(error.message);
        }
    });

})();
</script>

</body>
</html>

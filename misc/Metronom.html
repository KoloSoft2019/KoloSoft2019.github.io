<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exaktes Metronom</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

button {
    font-size: 2rem;
    padding: 20px 40px;
    cursor: pointer;
}
</style>
</head>

<body>

<button id="startButton">Start</button>

<script>
(async () => {

    const button = document.getElementById("startButton");

    let audioContext = null;
    let audioBuffer = null;

    let running = false;
    let nextBeatTime = 0;

    let timerID = null;

    // 🎯 BPM einstellen
    const bpm = 120;
    const interval = 60 / bpm;

    async function loadSound(ctx) {
        const response = await fetch("Beat.mp3");

        if (!response.ok) {
            throw new Error("Beat.mp3 konnte nicht geladen werden.");
        }

        const arrayBuffer = await response.arrayBuffer();
        return await ctx.decodeAudioData(arrayBuffer);
    }

    function schedule() {

        // Lookahead Scheduling (wichtig für Genauigkeit)
        while (nextBeatTime < audioContext.currentTime + 0.2) {

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);

            source.start(nextBeatTime);

            nextBeatTime += interval;
        }

        if (running) {
            timerID = setTimeout(schedule, 25);
        }
    }

    button.addEventListener("click", async () => {

        // START
        if (!running) {

            button.textContent = "Stop";

            if (!audioContext) {
                audioContext = new AudioContext();
                await audioContext.resume();
                audioBuffer = await loadSound(audioContext);
            }

            running = true;

            nextBeatTime = audioContext.currentTime + 0.1;

            schedule();
        }

        // STOP
        else {
            running = false;
            button.textContent = "Start";

            if (timerID) {
                clearTimeout(timerID);
                timerID = null;
            }
        }
    });

})();
</script>

</body>
</html>
